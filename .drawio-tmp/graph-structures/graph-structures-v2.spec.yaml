meta:
  profile: academic-paper
  figureType: architecture
  source: replicated
  theme: academic-color
  title: Graph Structures for Peptide Bond Prediction
  description: Graph construction strategies for peptide sequence representation
  canvas: 1800x900
  replication:
    colorMode: preserve-original
    background: '#FFFFFF'
    palette:
      - hex: '#3B82F6'
        role: type 0 edges (sequence backbone)
        appliesTo: edges
        confidence: high
      - hex: '#22C55E'
        role: type 1 edges (short distance)
        appliesTo: edges
        confidence: high
      - hex: '#F97316'
        role: type 2 edges (long distance)
        appliesTo: edges
        confidence: high
      - hex: '#A855F7'
        role: type 3 and 4 edges (long-range and global)
        appliesTo: edges
        confidence: high
modules:
  - id: panel_a
    label: |-
      (a) Sequence Graph
      (d_max = 1)
    style:
      fillColor: '#F0F9FF'
      strokeColor: '#BAE6FD'
      rounded: 1
      arcSize: 6
      strokeDasharray: 8 4
  - id: panel_b
    label: |-
      (b) Distance Graph
      (d_max > 1)
    style:
      fillColor: '#F0FDF4'
      strokeColor: '#BBF7D0'
      rounded: 1
      arcSize: 6
      strokeDasharray: 8 4
  - id: panel_c
    label: |-
      (c) Hybrid Graph
      (Distance + Long-range)
    style:
      fillColor: '#F0FDF4'
      strokeColor: '#BBF7D0'
      rounded: 1
      arcSize: 6
      strokeDasharray: 8 4
  - id: panel_d
    label: (d) Global Node (for all graphs)
    style:
      fillColor: '#F5F3FF'
      strokeColor: '#DDD6FE'
      rounded: 1
      arcSize: 6
      strokeDasharray: 8 4
  - id: panel_e
    label: (e) Edge Type Legend
    style:
      fillColor: '#F5F3FF'
      strokeColor: '#DDD6FE'
      rounded: 1
      arcSize: 6
      strokeDasharray: 8 4
