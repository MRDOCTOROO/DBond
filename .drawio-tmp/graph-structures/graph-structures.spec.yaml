meta:
  profile: academic-paper
  figureType: architecture
  source: replicated
  theme: academic-color
  title: Graph Structures for Peptide Bond Prediction
  description: Different graph construction strategies for representing peptide sequences in mass spectrometry analysis
  legend: 'Edge types: 0 (sequence), 1 (short distance), 2 (long distance), 3 (long-range), 4 (global)'
  canvas: 1200x800
  replication:
    colorMode: preserve-original
    background: '#FFFFFF'
    palette:
      - hex: '#3B82F6'
        role: type 0 edges (sequence)
        appliesTo: edges
        confidence: high
      - hex: '#22C55E'
        role: type 1 edges (short distance)
        appliesTo: edges
        confidence: high
      - hex: '#F97316'
        role: type 2 edges (long distance)
        appliesTo: edges
        confidence: high
      - hex: '#A855F7'
        role: type 3 and 4 edges (long-range and global)
        appliesTo: edges
        confidence: high
modules:
  - id: panel_a
    label: (a) Sequence Graph (d_max = 1)
    style:
      fillColor: '#F8FAFC'
      strokeColor: '#CBD5E1'
      rounded: 1
      arcSize: 8
  - id: panel_b
    label: (b) Distance Graph (d_max > 1)
    style:
      fillColor: '#F8FAFC'
      strokeColor: '#CBD5E1'
      rounded: 1
      arcSize: 8
  - id: panel_c
    label: (c) Hybrid Graph (Distance + Long-range)
    style:
