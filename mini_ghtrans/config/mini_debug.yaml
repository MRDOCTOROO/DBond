# mini_ghtrans: 最小数据全流程验证配置

model:
  hidden_dim: 128
  num_attention_heads: 8
  dropout: 0.1
  leaky_relu_slope: 0.2
  use_edge_features: true
  edge_dim: 32
  concat_heads: true
  num_gcn_layers: 3
  num_gat_layers: 2
  num_hierarchical_layers: 2
  max_seq_len: 64
  alphabet: "#ABCDEFGHIKLMNOPQRSTVWXYZ"
  pad_char: "#"
  aa_embedding_dim: 32
  position_embedding_dim: 16
  physicochemical_dim: 16
  num_physicochemical_features: 4
  num_state_features: 3
  num_env_features: 2
  edge_types: ["sequence", "distance", "functional", "long_range", "global"]
  edge_embedding_dim: 16
  distance_embedding_dim: 16
  max_distance: 10
  use_long_range_edges: true
  long_range_stride: 10
  long_range_hops: 1
  use_global_node: true
  num_classes: 1
  aggregator_type: "mean"
  diffusion_steps: 3
  num_attention_types: 3

training:
  epochs: 2
  batch_size: 16
  learning_rate: 0.001
  weight_decay: 0.0001
  gradient_clip_norm: 1.0
  scheduler: "cosine"
  warmup_epochs: 1
  min_lr: 0.00001
  early_stopping: false
  patience: 5
  min_delta: 0.0
  validation_split: 0.2
  validation_interval: 1
  save_interval: 1
  save_best_only: false
  checkpoint_dir: "mini_ghtrans/checkpoints"
  log_interval: 1

data:
  train_csv_path: "mini_ghtrans/mini_data/train.mini.multi.csv"
  test_csv_path: "mini_ghtrans/mini_data/test.mini.multi.csv"
  val_csv_path: null
  max_seq_len: 64
  graph_strategy: "distance"
  augmentation: false
  cache_graphs: true
  cache_dir: "mini_ghtrans/cache/graph_data"
  rebuild_cache: false
  cache_full_graphs: false
  augmentation_prob: 0.0
  max_augmentation_trials: 0
  num_workers: 0
  pin_memory: false
  drop_last: false
  use_class_weights: false
  focal_loss_alpha: 0.25
  focal_loss_gamma: 2.0

loss:
  main_loss: "binary_cross_entropy"
  use_auxiliary_losses: false
  auxiliary_loss_weights:
    focal: 0.5
    dice: 0.3
    l2_regularization: 0.1
  handle_imbalance: false
  imbalance_strategy: "weighted"
  pos_weight: null

optimizer:
  type: "adamw"
  betas: [0.9, 0.999]
  eps: 1e-8
  momentum: 0.9
  nesterov: true
  step_size: 30
  gamma: 0.1
  t_max: 100
  eta_min: 0.0

evaluation:
  metrics: ["accuracy", "precision", "recall", "f1", "auc", "hamming_loss"]
  threshold: 0.5
  threshold_strategy: "fixed"
  eval_interval: 1
  test_time_augmentation: false
  ensemble_predictions: false
  num_ensemble_models: 1

device:
  auto_detect: true
  device_type: "cpu"
  gpu_id: 0
  use_amp: false
  amp_backend: "native"

logging:
  level: "INFO"
  log_dir: "mini_ghtrans/logs"
  log_file: "training.log"
  use_tensorboard: false
  tensorboard_log_dir: "mini_ghtrans/tensorboard"
  log_interval: 1
  save_graph_interval: 1

experiment:
  name: "mini_ghtrans_debug"
  version: "v1.0"
  description: "mini_ghtrans minimal end-to-end validation with detailed timing logs"
  seed: 42
  deterministic: false
  benchmark: false

advanced:
  use_ensemble: false
  ensemble_methods: ["voting", "averaging", "stacking"]
  hyperparameter_search: false
  search_method: "grid"
  distributed: false
  backend: "nccl"
  quantization: false
  quantization_method: "dynamic"
  distillation: false
  teacher_model_path: null
  distillation_alpha: 0.5
  distillation_temperature: 4.0

performance:
  gradient_checkpointing: false
  use_efficient_attention: false
  max_memory_usage: "4GB"
  compile_model: false
  use_torch_compile: false
  prefetch_factor: 2
  persistent_workers: false

debug:
  debug_mode: true
  check_gradients: false
  check_nan_inf: false
  save_attention_weights: false
  save_graph_structures: false
  visualize_predictions: false
  profile_memory: false
  profile_time: true
