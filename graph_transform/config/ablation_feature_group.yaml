# Feature-group progressive addition 消融实验 —— base 配置
#
# 实验目标：从裸模型（无 state 无 env）出发，每次只加一组特征，明确 4 类实验条件
#   （charge / mass+intensity / NCE / scan_num）对键断裂预测的贡献排序。
#
# 架构：3 GCN + 2 GAT（与默认模型架构一致；default.yaml 当前是 0 GCN+5 GAT，这里改回完整结构）。
# env 第二维固定 scan_num（与 DBond-s/m 一致，不用 rt）。
#
# 用法：本文件是模板，ablation 段的 6 个开关默认全 false（=baseline / full）。
#   实际运行时由 run_feature_group_ablation.py 自动派生 6 个 setting 配置，
#   或手动把某个开关设 true 后用 train_5fold.py 跑：
#     python scripts/train_5fold.py --config config/ablation_feature_group.yaml
#
# 6 个 setting 与 mask 映射（state=[charge,pep_mass,intensity], env=[nce,scan_num]）：
#   baseline_no_state_env   state=[F,F,F] env=[F,F]   裸模型起点
#   state_charge_only       state=[T,F,F] env=[F,F]   +charge
#   state_mass_intensity_only state=[F,T,T] env=[F,F] +mass+intensity
#   env_nce_only            state=[F,F,F] env=[T,F]   +NCE
#   env_scan_num_only       state=[F,F,F] env=[F,T]   +scan_num
#   (全 false)              state=[T,T,T] env=[T,T]   full 全特征（终点参照）

model:
  hidden_dim: 256
  num_attention_heads: 4
  dropout: 0.1
  leaky_relu_slope: 0.2
  use_edge_features: true
  edge_dim: 32
  concat_heads: true
  # 完整架构：3 GCN + 2 GAT（区别于 default.yaml 的 0 GCN+5 GAT）
  num_gcn_layers: 3
  num_gat_layers: 2
  max_seq_len: 32
  alphabet: '#ABCDEFGHIKLMNOPQRSTVWXYZ'
  pad_char: '#'
  aa_embedding_dim: 64
  position_embedding_dim: 32
  physicochemical_dim: 32
  num_physicochemical_features: 4
  num_state_features: 3
  num_env_features: 2
  use_position_embedding: true
  use_physicochemical_features: true
  # state/env 整组开关保持 true（由 state_feature_mask/env_feature_mask 控制子组级保留）
  use_state_features: true
  use_env_features: true
  # per-feature mask 默认全 true（=full）；具体值由 ablation 开关在 apply_ablation_config 中覆盖
  state_feature_mask: [true, true, true]
  env_feature_mask: [true, true]
  edge_types:
  - sequence
  - distance
  - functional
  - long_range
  - global
  edge_embedding_dim: 16
  distance_embedding_dim: 16
  max_distance: 10
  use_edge_type_embedding: true
  use_distance_embedding: true
  use_raw_edge_attr: true
  gat_use_edge_bias: true
  gat_use_edge_gate: true
  bond_use_edge_repr: true
  bond_use_diff_feature: true
  bond_use_product_feature: true
  use_long_range_edges: false
  long_range_stride: 10
  long_range_hops: 1
  use_global_node: true
  num_classes: 1
training:
  epochs: 100
  batch_size: 1024
  learning_rate: 0.0001
  weight_decay: 0.0001
  gradient_clip_norm: 1.0
  scheduler: cosine
  warmup_epochs: 10
  min_lr: 1.0e-05
  early_stopping: true
  patience: 10
  min_delta: 0.001
  validation_split: 0.2
  validation_interval: 1
  save_interval: 10
  save_best_only: false
  # 5 折调度时 train_5fold.py 会在此路径下建 5fold/<timestamp>/fold_<id>/ 子目录，
  # apply_ablation_config 再附加 /<ablation_tag> 子目录隔离各 setting。
  checkpoint_dir: checkpoints/graph_transform/feature_group_ablation
data:
  # 5 折调度时 train_5fold.py 会覆盖为 dataset/5fold/<fold_id>.{train,test}.*.csv
  train_csv_path: dataset/dataset_private/1222.train.fbr.shuffle.multi.csv
  test_csv_path: dataset/dataset_private/1222.test.fbr.multi.csv
  val_csv_path: null
  max_seq_len: 32
  graph_strategy: distance
  # env 第二维固定 scan_num（与 DBond-s/m 一致；env_feature_scale=1.0 保持 scan_num_5fold 原值）
  env_feature_name: scan_num
  env_feature_scale: 1.0
  augmentation: false
  cache_graphs: true
  cache_full_graphs: false
  cache_dir: cache/graph_data
  augmentation_prob: 0.3
  max_augmentation_trials: 3
  num_workers: 32
  pin_memory: true
  drop_last: true
  use_class_weights: true
  focal_loss_alpha: 0.25
  focal_loss_gamma: 2.0
loss:
  main_loss: binary_cross_entropy
  use_auxiliary_losses: false
  auxiliary_loss_weights:
    focal: 0.5
    dice: 0.3
    l2_regularization: 0.1
  handle_imbalance: false
  imbalance_strategy: weighted
  pos_weight: null
optimizer:
  type: adamw
  betas:
  - 0.9
  - 0.999
  eps: 1e-8
  momentum: 0.9
  nesterov: true
  step_size: 30
  gamma: 0.1
  t_max: 100
  eta_min: 0.0
evaluation:
  metrics:
  - accuracy
  - precision
  - recall
  - f1
  - auc
  - hamming_loss
  threshold: 0.5
  threshold_strategy: fixed
  eval_interval: 1
  test_time_augmentation: false
  ensemble_predictions: false
  num_ensemble_models: 5
  save_outputs: true
  output_pred_dir: result/pred/graph_transform/feature_group_ablation
  output_metric_dir: result/metric/graph_transform/feature_group_ablation
device:
  auto_detect: true
  device_type: cuda
  gpu_id: 0
  use_amp: true
  amp_backend: native
logging:
  level: INFO
  log_dir: logs/graph_transform/feature_group_ablation
  log_file: training.log
  use_tensorboard: true
  tensorboard_log_dir: tensorboard/graph_transform/feature_group_ablation
  save_training_curves: true
  save_loss_curves: true
  plot_dir: null
  log_interval: 10
  save_graph_interval: 50
experiment:
  name: graph_transform_feature_group_ablation
  version: v1.0
  description: Feature-group progressive addition (3GCN+2GAT, scan_num only)
  seed: 42
  deterministic: false
  benchmark: true
ablation:
  # 默认全 false = full（全特征，终点参照）。
  # 运行时由调度脚本或手动设置其中一个为 true（互斥，由 apply_ablation_config 校验）。
  tag: null
  base_experiment_name: null
  use_sequence_graph: false
  use_hybrid_graph: false
  disable_global_node: false
  gcn_only: false
  gat_only: false
  no_message_passing: false
  no_edge_attr: false
  no_state_env: false
  # Feature-group progressive addition 开关（与本段上方 8 个开关互斥）
  baseline_no_state_env: false
  state_charge_only: false
  state_mass_intensity_only: false
  env_nce_only: false
  env_scan_num_only: false
  # 每个 setting 必须重建 edge cache（edge_attr 含 state/env，mask 不同则 edge_attr 不同）
  rebuild_cache: true
advanced:
  use_ensemble: false
  ensemble_methods:
  - voting
  - averaging
  - stacking
  hyperparameter_search: false
  search_method: grid
  distributed: false
  backend: nccl
  quantization: false
  quantization_method: dynamic
  distillation: false
  teacher_model_path: null
  distillation_alpha: 0.5
  distillation_temperature: 4.0
performance:
  gradient_checkpointing: false
  use_efficient_attention: false
  max_memory_usage: 8GB
  compile_model: false
  use_torch_compile: false
  prefetch_factor: 2
  persistent_workers: false
debug:
  debug_mode: false
  check_gradients: false
  check_nan_inf: true
  log_grad_norm: true
  save_nonfinite_batch: true
  diagnostic_dir: logs/graph_transform/diagnostics
  force_gc_on_epoch_end: true
  force_gc_on_eval_end: true
  empty_cache_on_epoch_end: true
  save_attention_weights: false
  save_graph_structures: false
  visualize_predictions: false
  profile_memory: false
  profile_time: false
