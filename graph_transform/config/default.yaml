# 图神经网络键级别二分类系统配置文件

# 模型配置
model:
  # 基础配置
  hidden_dim: 256
  num_attention_heads: 4
  dropout: 0.1
  leaky_relu_slope: 0.2
  
  # 图配置
  use_edge_features: true
  edge_dim: 32
  concat_heads: true
  
  # 网络结构配置
  num_gcn_layers: 3
  num_gat_layers: 2
  
  # 序列配置
  max_seq_len: 32
  alphabet: "#ABCDEFGHIKLMNOPQRSTVWXYZ"
  pad_char: "#"
  
  # 特征维度配置
  aa_embedding_dim: 64
  position_embedding_dim: 32
  physicochemical_dim: 32
  num_physicochemical_features: 4
  num_state_features: 3
  num_env_features: 2
  use_position_embedding: true
  use_physicochemical_features: true
  use_state_features: true
  use_env_features: true
  
  # 边配置
  edge_types: ["sequence", "distance", "functional", "long_range", "global"]
  edge_embedding_dim: 16
  distance_embedding_dim: 16
  max_distance: 10
  use_edge_type_embedding: true
  use_distance_embedding: true
  use_raw_edge_attr: true
  gat_use_edge_bias: true
  gat_use_edge_gate: true
  bond_use_edge_repr: true
  bond_use_diff_feature: true
  bond_use_product_feature: true

  # 图结构增强

  use_long_range_edges: false      # 开启稀疏长程边
  long_range_stride: 10           # 间隔
  long_range_hops: 1              # 每个节点连接几跳
  use_global_node: true           # 开关全局虚拟节点

  
  # 输出配置
  num_classes: 1  # 键级别断裂为二分类
  
  # 其他配置
# 训练配置
training:
  # 基础训练参数
  epochs: 60
  batch_size: 1024
  learning_rate: 0.0001
  weight_decay: 0.0001
  gradient_clip_norm: 1.0
  
  # 学习率调度
  scheduler: "cosine"  # "cosine", "step", "exponential", "plateau"
  warmup_epochs: 10
  min_lr: 0.00001
  
  # 早停配置
  early_stopping: true
  patience: 10
  min_delta: 0.001
  
  # 验证配置
  validation_split: 0.2
  validation_interval: 1
  
  # 保存配置
  save_interval: 10
  save_best_only: false
  checkpoint_dir: "checkpoints/graph_transform"

# 数据配置
data:
  # 数据路径
  train_csv_path: "dataset/dataset_private/1222.train.fbr.shuffle.multi.csv"
  test_csv_path: "dataset/dataset_private/1222.test.fbr.multi.csv"
  val_csv_path: null  # 如果为null，从训练集分割
  
  # 数据处理配置
  max_seq_len: 32
  graph_strategy: "distance"  # "sequence", "distance", "hybrid", "knowledge"
  env_feature_name: "scan_num"  # 可选 "scan_num" / "rt"
  env_feature_scale: 1.0        # rt 通常用 0.01；scan_num 测试时默认保持原值
  augmentation: false  # 是否使用数据增强
  cache_graphs: true #false 会让每个 epoch 都在构图/读 CSV，true启用缓存
  # cache_full_graphs: 缓存完整图数据（含 edge_attr/labels/state_vars 等）。
  # 设为 true 可避免每个 epoch 重复构图，但 477K 样本约需 3-5GB 内存。
  # 如果系统内存充足可开启；否则保持 false，仅使用边结构缓存。
  cache_full_graphs: false
  cache_dir: "cache/graph_data"
  
  # 数据增强配置
  augmentation_prob: 0.3
  max_augmentation_trials: 3
  
  # 批处理配置
  num_workers: 32 #最低尝试的4线程
  pin_memory: true
  drop_last: true
  
  # 数据平衡
  use_class_weights: true
  focal_loss_alpha: 0.25
  focal_loss_gamma: 2.0

# 损失函数配置
loss:
  # 主要损失类型
  main_loss: "binary_cross_entropy"  # "binary_cross_entropy", "focal", "dice"
  
  # 辅助损失
  use_auxiliary_losses: false
  auxiliary_loss_weights:
    focal: 0.5
    dice: 0.3
    l2_regularization: 0.1
  
  # 类别不平衡处理
  handle_imbalance: false
  imbalance_strategy: "weighted"  # "focal", "weighted", "oversample"
  pos_weight: null

# 优化器配置
optimizer:
  type: "adamw"  # "adam", "adamw", "sgd", "rmsprop"
  
  # Adam/AdamW特定参数
  betas: [0.9, 0.999]
  eps: 1e-8
  
  # SGD特定参数
  momentum: 0.9
  nesterov: true
  
  # 学习率调度器参数
  step_size: 30
  gamma: 0.1
  
  # 余弦退火参数
  t_max: 100
  eta_min: 0.0

# 评估配置
evaluation:
  # 评估指标
  metrics: ["accuracy", "precision", "recall", "f1", "auc", "hamming_loss"]
  
  # 阈值配置
  threshold: 0.5
  threshold_strategy: "fixed"  # "fixed", "adaptive", "optimal"
  
  # 验证频率
  eval_interval: 1
  
  # 测试时配置
  test_time_augmentation: false
  ensemble_predictions: false
  num_ensemble_models: 5

  # 评估结果输出
  save_outputs: true
  output_pred_dir: "result/pred/graph_transform"
  output_metric_dir: "result/metric/graph_transform"

# 设备配置
device:
  # 自动检测设备
  auto_detect: true
  
  # 手动指定设备
  device_type: "cuda"  # "cuda", "cpu", "mps"
  gpu_id: 0
  
  # 混合精度训练
  use_amp: false
  amp_backend: "native"  # "native", "apex"

# 日志配置
logging:
  # 日志级别
  level: "INFO"  # "DEBUG", "INFO", "WARNING", "ERROR"
  
  # 日志输出
  log_dir: "logs/graph_transform"
  log_file: "training.log"
  
  # TensorBoard配置
  use_tensorboard: true
  tensorboard_log_dir: "tensorboard/graph_transform"
  save_training_curves: true
  save_loss_curves: true
  plot_dir: null  # null时默认保存到当前checkpoint目录下的plots/
  
  # 日志频率
  log_interval: 10
  save_graph_interval: 50

# 实验配置
experiment:
  # 实验名称和版本
  name: "graph_transform_binary_bond"
  version: "v1.0"
  
  # 实验描述
  description: "图神经网络键级别二分类用于蛋白质二硫键断裂预测（state/env特征拆分，无fbr输入）"
  
  # 随机种子
  seed: 42
  deterministic: false #不需要严格复现，改成 false
  
  # 可重现性
  benchmark: true

# 高级配置
advanced:
  # 模型集成
  use_ensemble: false
  ensemble_methods: ["voting", "averaging", "stacking"]
  
  # 超参数优化
  hyperparameter_search: false
  search_method: "grid"  # "grid", "random", "bayesian"
  
  # 分布式训练
  distributed: false
  backend: "nccl"
  
  # 模型量化
  quantization: false
  quantization_method: "dynamic"  # "dynamic", "static", "qat"
  
  # 模型蒸馏
  distillation: false
  teacher_model_path: null
  distillation_alpha: 0.5
  distillation_temperature: 4.0

# 性能优化配置
performance:
  # 内存优化
  gradient_checkpointing: false
  use_efficient_attention: false
  max_memory_usage: "8GB"
  
  # 计算优化
  compile_model: false  # PyTorch 2.0编译
  use_torch_compile: false
  
  # I/O优化
  prefetch_factor: 4
  persistent_workers: true

# 调试配置
debug:
  # 调试模式
  debug_mode: false
  
  # 梯度检查
  check_gradients: false
  check_nan_inf: true
  log_grad_norm: true
  save_nonfinite_batch: true
  diagnostic_dir: "logs/graph_transform/diagnostics"
  force_gc_on_epoch_end: false
  force_gc_on_eval_end: false
  empty_cache_on_epoch_end: false
  
  # 可视化
  save_attention_weights: false
  save_graph_structures: false
  visualize_predictions: false
  
  # 性能分析
  profile_memory: false  # true时记录CUDA显存占用
  profile_time: false    # true时输出batch级和模型内部各阶段耗时
